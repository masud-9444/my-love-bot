name: Run Telegram Love Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */6 * * *' # हर 6 घंटे में यह अपने आप रीस्टार्ट होगा ताकि बॉट कभी बंद न हो
  workflow_dispatch: # मैन्युअली स्टार्ट करने के लिए BUTTON

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-node-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot
      run: python main.py
